name: Setup GitHub CLI Actions
description:
  Install GitHub CLI on self-hosted runners with multi-platform support
author: Hercules

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: terminal
  color: gray-dark

# Define your inputs here.
inputs:
  version:
    description:
      Version of GitHub CLI to install (without v prefix). Defaults to latest
    required: false
    default: latest
  platform:
    description:
      Platform to install for (Linux, macOS, Windows). Defaults to current
      platform
    required: false
  architecture:
    description:
      Architecture to install for (amd64, arm64, 386). Defaults to amd64
    required: false
    default: amd64
  archive_format:
    description:
      Archive format (tar.gz for Linux/macOS, ZIP for Windows). Defaults to
      auto-detected based on platform
    required: false

# Define your outputs here.
outputs:
  version:
    description: The version of GitHub CLI that was installed

runs:
  using: node20
  main: dist/index.js
